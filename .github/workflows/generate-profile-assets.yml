
name: Generate Profile Assets & Stats

on:
  schedule:
    - cron: '0 */12 * * *'
  issues:
    types: [opened, closed, deleted, reopened]
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  update-profile:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Create assets directory
        run: mkdir -p assets

      - name: Run Issue Tracker Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: python .github/scripts/update_stats.py

      - name: Generate Snake Animation
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            assets/github-contribution-grid-snake.svg
            assets/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Generate GitHub Metrics Dashboard
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          user: madhanalagarsamy
          filename: assets/github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          plugin_languages: yes
          plugin_languages_details: percentage
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          config_timezone: UTC

      - name: Commit and Push All Assets
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md assets/
          if ! git diff-index --quiet HEAD; then
            git commit -m "chore: regenerate profile assets and update issue count [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
